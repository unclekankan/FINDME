<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fgn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2c488"/>
      <stop offset="100%" stop-color="#c9974a"/>
    </linearGradient>
    <linearGradient id="fgs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>

  <!-- 外环 -->
  <circle cx="50" cy="50" r="47" fill="#0f0c29" stroke="url(#fgn)" stroke-width="2.5"/>

  <!-- 罗盘十字 -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- 四方向标记 -->
  <polygon points="50,12 53,22 47,22" fill="url(#fgn)"/>
  <polygon points="50,88 53,78 47,78" fill="rgba(255,255,255,0.2)"/>
  <polygon points="12,50 22,47 22,53" fill="rgba(255,255,255,0.2)"/>
  <polygon points="88,50 78,47 78,53" fill="rgba(255,255,255,0.2)"/>

  <!-- 中央人形 -->
  <circle cx="50" cy="37" r="8" fill="none" stroke="url(#fgn)" stroke-width="2.5"/>
  <path d="M38 62c0-7 5.5-13 12-13s12 6 12 13" fill="none" stroke="url(#fgn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 放大镜环 -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="url(#fgs)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- 放大镜手柄 -->
  <line x1="68" y1="68" x2="76" y2="76" stroke="url(#fgn)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
